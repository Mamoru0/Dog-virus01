<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เว็บนี้ให้พี่จาวี้สุดสวย</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding-top: 100px;
            color: #fff;
        }

        h1 {
            font-size: 40px;
        }


        p {
            font-size: 20px;
            margin: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 20px;
            background-color: #ff4d6d;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
           transform: translateY(-5px);
        }

        #secret {
            display: none;
            margin-top: 30px;
            font-size: 24px;
            color: #fff;
        }
        
    </style>
</head>
<body>

    <h1>💖 เรามีอะไรจะบอกครับพี่จาวี้💖</h1>
    <p>กดปุ่มนี้ก่อนดิ...</p>

    <button onclick="showLove(); playSound()">กดเลย ❤</button>
    <audio id="sound" src="floraphonic-baby-squeak-toy-2-183912.mp3"></audio>

<script>
let sound = document.getElementById("sound");
sound.volume = 0.3;

function playSound() {
    sound.currentTime = 0;
    sound.play();
}
</script>

    <div id="secret">
        <p>รักพี่จาวี้นะครับ 💗</p>
        <p>แบบ.. รักมากๆ55555</p>
    </div>
   
    <script>
        function showLove() {
            document.getElementById("secret").style.display = "block";
        }
    </script>
    <button id="noBtn">ไม่ชอบ 😒</button>

<script>
let btn = document.getElementById("noBtn");

function run() {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    btn.style.position = "absolute";
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

btn.onmouseover = run;
btn.ontouchstart = run;

</script>

</body>
</html>
